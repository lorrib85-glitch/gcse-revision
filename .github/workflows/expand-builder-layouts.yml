name: Expand BuilderBlock layouts

on:
  push:
    paths:
      - 'scripts/expand_builder_layouts.py'

permissions:
  contents: write

jobs:
  expand-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Add adaptive subject layouts
        run: python scripts/expand_builder_layouts.py

      - name: Validate production build
        run: npm run build

      - name: Commit adaptive BuilderBlock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/learning/BuilderBlock.jsx src/dev/componentReview/fixtures.js src/dev/componentReview/reviewManifest.jsx
          git commit -m "Add Maths and quote BuilderBlock layouts"
          git push
