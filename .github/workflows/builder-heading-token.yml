name: BuilderBlock heading token

on:
  push:
    paths:
      - 'scripts/builder_heading_token.py'

permissions:
  contents: write

jobs:
  update-heading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move BuilderBlock heading to screen level
        run: python scripts/builder_heading_token.py

      - name: Commit heading update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/learning/BuilderBlock.jsx
          git commit -m "Align BuilderBlock heading with screen token"
          git push
