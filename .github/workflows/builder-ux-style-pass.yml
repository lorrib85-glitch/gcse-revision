name: BuilderBlock UX styling pass

on:
  push:
    paths:
      - '.github/workflows/builder-ux-style-pass.yml'

permissions:
  contents: write

jobs:
  restyle-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refine BuilderBlock styling
        run: python scripts/builder_ux_style_pass.py

      - name: Commit styling pass
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/learning/BuilderBlock.jsx
          git commit -m "Refine BuilderBlock mobile UX styling"
          git push
