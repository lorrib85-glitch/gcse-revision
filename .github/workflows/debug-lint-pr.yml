name: Debug lint PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  debug-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture lint errors only
        id: lint
        continue-on-error: true
        run: pnpm exec eslint . --quiet > lint-output.txt 2>&1
      - name: Update lint diagnostics
        if: steps.lint.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const output = fs.readFileSync('lint-output.txt', 'utf8')
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: 5015951281,
              body: `Temporary lint errors only:\n\n\`\`\`text\n${output}\n\`\`\``,
            })
      - name: Preserve lint result
        if: steps.lint.outcome == 'failure'
        run: exit 1
