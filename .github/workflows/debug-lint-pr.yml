name: Visual narrative targeted checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-narrative-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run targeted checks
        id: checks
        continue-on-error: true
        shell: bash
        run: |
          set +e

          pnpm exec eslint \
            src/components/core/CinematicContinueCTA.jsx \
            src/components/learning/VisualNarrativeScreen.jsx \
            src/constants/generalTheme.js \
            src/constants/typography.js \
            tests/architecture/visual-narrative-contract.test.js \
            > lint-output.txt 2>&1
          lint_status=$?

          cat > vitest.visual-narrative.config.js <<'EOF'
          import { defineConfig } from 'vitest/config'

          export default defineConfig({
            test: {
              include: ['tests/architecture/visual-narrative-contract.test.js'],
              environment: 'node',
            },
          })
          EOF

          pnpm exec vitest run --config vitest.visual-narrative.config.js \
            > test-output.txt 2>&1
          test_status=$?

          pnpm build > build-output.txt 2>&1
          build_status=$?

          {
            echo "RESULTS lint=$lint_status architecture=$test_status build=$build_status"
            echo
            echo "=== ESLint ==="
            cat lint-output.txt
            echo
            echo "=== Architecture test ==="
            tail -120 test-output.txt
            echo
            echo "=== Build tail ==="
            tail -20 build-output.txt
          } > targeted-output.txt

          if [ "$lint_status" -ne 0 ] || [ "$test_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then
            exit 1
          fi
      - name: Update diagnostics
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const output = fs.readFileSync('targeted-output.txt', 'utf8')
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: 5015951281,
              body: `Temporary VisualNarrative targeted checks:\n\n\`\`\`text\n${output}\n\`\`\``,
            })
      - name: Preserve check result
        if: steps.checks.outcome == 'failure'
        run: exit 1
